  <text x="150" y="145" text-anchor="middle" fill="#f1f5f9" font-size="13" font-weight="600">ServerManifest</text>
  <text x="150" y="162" text-anchor="middle" fill="#64748b" font-size="10">mcp-server.toml</text>

  <rect x="280" y="100" width="200" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
