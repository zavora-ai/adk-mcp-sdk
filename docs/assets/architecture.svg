  <text x="450" y="48" text-anchor="middle" fill="white" font-size="18" font-weight="bold">ADK-Rust Enterprise Registry</text>
  <text x="450" y="68" text-anchor="middle" fill="#e2e8f0" font-size="11">Auto-onboarding · Health monitoring · Tool governance · Risk classification</text>

  <!-- Registry components -->
  <rect x="50" y="100" width="200" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
